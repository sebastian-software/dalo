name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --check

      - name: Test
        run: cargo test

      - name: Installer and workflow tests
        run: sh tests/install.sh && sh tests/docs.sh && sh tests/workflows.sh

      - name: npm wrapper test
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: npm test
        run: cd npm && npm test

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Release build
        run: cargo build --release

      - name: Documentation
        run: RUSTDOCFLAGS="-D warnings" cargo doc --no-deps --all-features

  msrv:
    name: MSRV
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.93"

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Check
        run: cargo check --locked --all-targets --all-features

  audit:
    name: Dependency audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-deny
        run: cargo install cargo-deny --version 0.19.9 --locked

      - name: Audit dependencies
        run: cargo deny check

  coverage:
    name: Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --version 0.8.4 --locked

      - name: Coverage summary
        run: cargo llvm-cov --workspace --all-features --summary-only
