name: Deploy site to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "site/**"
      - "Cargo.toml"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

# Allow the workflow to publish to GitHub Pages via OIDC.
permissions:
  contents: read
  pages: write
  id-token: write

# One concurrent deployment; don't cancel an in-progress publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Stamp site version
        shell: bash
        run: |
          version="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n 1)"
          test -n "$version"
          grep -R "__DALO_VERSION__" -n site
          find site -type f -name "*.html" -exec sed -i "s/__DALO_VERSION__/${version}/g" {} +

      - name: Upload static site
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
