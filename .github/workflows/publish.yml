name: publish

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}

  publish-crate:
    name: Publish crate
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v7
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          test -n "$CARGO_REGISTRY_TOKEN"
          cargo publish --locked

  publish-npm:
    name: Publish npm wrapper
    needs: [release-please, release-artifacts]
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      # npm exchanges this GitHub Actions OIDC token for a short-lived publish
      # credential. No NPM_TOKEN is required or consumed.
      id-token: write
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v7
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Publish npm wrapper
        shell: bash
        env:
          TAG_NAME: ${{ needs.release-please.outputs.tag_name }}
        run: |
          case "$TAG_NAME" in
            dalo-v*) version="${TAG_NAME#dalo-v}" ;;
            v*) version="${TAG_NAME#v}" ;;
            *) echo "::error::unexpected release tag '${TAG_NAME}'"; exit 1 ;;
          esac
          cd npm
          npm version "$version" --no-git-tag-version
          npm test
          npm pack --dry-run
          DALO_VERSION="$TAG_NAME" node -e "require('./lib/release').ensureBinary().then(binary => require('node:child_process').execFileSync(binary, ['--version'], { stdio: 'inherit' }))"
          npm publish --access public

  release-artifacts:
    name: Build ${{ matrix.target }}
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    permissions:
      contents: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            builder: cross
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            builder: cross
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            builder: cross
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            builder: cross
          - os: macos-14
            target: x86_64-apple-darwin
            builder: cargo
          - os: macos-14
            target: aarch64-apple-darwin
            builder: cargo
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v7
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Install cross
        if: ${{ matrix.builder == 'cross' }}
        run: cargo install cross --version 0.2.5 --locked

      - name: Build binary
        shell: bash
        run: |
          if [ "${{ matrix.builder }}" = "cross" ]; then
            cross build --release --locked --target "${{ matrix.target }}"
          else
            cargo build --release --locked --target "${{ matrix.target }}"
          fi

      - name: Package artifact
        shell: bash
        env:
          TAG_NAME: ${{ needs.release-please.outputs.tag_name }}
          TARGET: ${{ matrix.target }}
        run: |
          case "$TAG_NAME" in
            dalo-v*) version="${TAG_NAME#dalo-v}" ;;
            v*) version="${TAG_NAME#v}" ;;
            *)
              echo "::error::unexpected release tag '${TAG_NAME}'"
              exit 1
              ;;
          esac
          package="dalo-${version}-${TARGET}"
          mkdir -p "dist/${package}"
          mkdir -p "dist/${package}/completions" "dist/${package}/man/man1"
          cp "target/${TARGET}/release/dalo" "dist/${package}/"
          cp README.md LICENSE "dist/${package}/"
          cargo run --locked -- completions bash > "dist/${package}/completions/dalo.bash"
          cargo run --locked -- completions zsh > "dist/${package}/completions/_dalo"
          cargo run --locked -- completions fish > "dist/${package}/completions/dalo.fish"
          cargo run --locked -- manpage > "dist/${package}/man/man1/dalo.1"
          tar -C dist -czf "dist/${package}.tar.gz" "${package}"
          (
            cd dist
            shasum -a 256 "${package}.tar.gz" > "${package}.tar.gz.sha256"
          )

      - name: Install Cosign
        uses: sigstore/cosign-installer@v4.1.2

      - name: Sign release archive
        shell: bash
        run: |
          for archive in dist/*.tar.gz; do
            cosign sign-blob --yes --bundle "${archive}.sigstore.json" "$archive"
          done

      - name: Upload artifact to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ needs.release-please.outputs.tag_name }}
        run: gh release upload "$TAG_NAME" dist/*.tar.gz dist/*.sha256 dist/*.sigstore.json --clobber
